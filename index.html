<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домашняя бухгалтерия</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>Домашняя бухгалтерия</h1>
            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="dashboard">Обзор</button>
                <button class="tab-btn" data-tab="analytics">Аналитика</button>
            </div>
            <div class="balance-container">
                <h2>Баланс: <span id="balance">0 ₽</span></h2>
            </div>
        </header>

        <main class="main-content">
            <!-- Dashboard Tab -->
            <div id="dashboard-tab" class="tab-content active">
                <div class="dashboard-grid">
            <section class="accounts-section">
                <h3>Счета</h3>
                <div class="total-balance">
                    <h4>Общий баланс: <span id="total-balance">0 ₽</span></h4>
                </div>
                <div class="accounts-list" id="accounts-list">
                    <!-- Accounts will be added here dynamically -->
                </div>
                <button id="add-account-btn">Добавить счет</button>
                <div class="account-form-container" id="account-form-container" style="display: none;">
                    <h4>Создать новый счет</h4>
                    <form id="account-form">
                        <div class="form-group">
                            <label for="account-name">Название счета:</label>
                            <input type="text" id="account-name" placeholder="Например: Тинькофф, Наличные" required>
                        </div>

                        <div class="form-group">
                            <label for="account-type">Тип счета:</label>
                            <select id="account-type" required>
                                <option value="cash">Наличные</option>
                                <option value="card">Банковская карта</option>
                                <option value="bank_account">Банковский счет</option>
                                <option value="electronic">Электронный кошелек</option>
                                <option value="deposit">Депозит</option>
                                <option value="credit">Кредит</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="initial-balance">Начальный баланс (₽):</label>
                            <input type="number" id="initial-balance" min="0" step="0.01" placeholder="0.00">
                        </div>

                        <button type="submit">Создать счет</button>
                    </form>
                </div>
            </section>

            <section class="form-section">
                <h3>Добавить новую операцию</h3>
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="account-select">Счет:</label>
                        <select id="account-select" required>
                            <!-- Options will be populated dynamically -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="operation-type">Тип операции:</label>
                        <select id="operation-type" required>
                            <option value="income">Доход</option>
                            <option value="expense">Расход</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="amount">Сумма (₽):</label>
                        <input type="number" id="amount" min="0.01" step="0.01" placeholder="Введите сумму" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Категория:</label>
                        <select id="category" required>
                            <option value="food">Продукты</option>
                            <option value="transport">Транспорт</option>
                            <option value="utilities">Коммунальные услуги</option>
                            <option value="entertainment">Развлечения</option>
                            <option value="health">Здоровье</option>
                            <option value="education">Образование</option>
                            <option value="family">Семейный бюджет</option>
                            <option value="other">Другое</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Описание:</label>
                        <input type="text" id="description" placeholder="Краткое описание">
                    </div>

                    <div class="form-group">
                        <label for="date">Дата:</label>
                        <input type="date" id="date" required>
                    </div>

                    <button type="submit">Добавить операцию</button>
                </form>
            </section>

            <section class="transactions-section">
                <h3>Последние операции</h3>
                <div class="filters">
                    <div class="filter-group">
                        <label for="date-from">От:</label>
                        <input type="date" id="date-from">
                    </div>
                    <div class="filter-group">
                        <label for="date-to">До:</label>
                        <input type="date" id="date-to">
                    </div>
                    <button id="apply-filters">Применить фильтры</button>
                </div>
                <div class="transactions-list" id="transactions-list">
                    <!-- Transactions will be added here dynamically -->
                </div>
            </section>

                <section class="chart-section">
                    <h3>Статистика расходов</h3>
                    <div class="chart-container">
                        <canvas id="expenses-chart"></canvas>
                    </div>
                </section>
                </div> <!-- end dashboard-grid -->
            </div> <!-- end dashboard-tab -->

            <!-- Analytics Tab -->
            <div id="analytics-tab" class="tab-content">
                <section class="analytics-filters card">
                    <h3>Фильтры аналитики</h3>
                    <div class="analytics-controls">
                        <div class="control-group">
                            <label>Тип:</label>
                            <table class="toggle-group-table">
                                <tr>
                                    <td style="padding-right: 15px;"><button class="toggle-btn active" data-type="expense" style="width: 100%;">Расходы</button></td>
                                    <td style="padding-left: 15px;"><button class="toggle-btn" data-type="income" style="width: 100%;">Доходы</button></td>
                                </tr>
                            </table>
                        </div>
                        <div class="control-group">
                            <label for="analytics-category">Категория:</label>
                            <select id="analytics-category">
                                <option value="all">Все категории</option>
                                <!-- Categories populated dynamically -->
                            </select>
                        </div>
                        <div class="control-group">
                            <label>Период:</label>
                            <div class="date-inputs">
                                <input type="date" id="analytics-from">
                                <input type="date" id="analytics-to">
                            </div>
                        </div>
                        <div class="control-group action-group">
                            <button id="apply-analytics" class="btn-apply">Показать</button>
                        </div>
                    </div>
                </section>

                <section class="analytics-results card">
                    <div class="analytics-summary">
                        <div class="summary-item">
                            <span class="label">Итого за период:</span>
                            <span id="analytics-total" class="value">0 ₽</span>
                        </div>
                    </div>
                    <div class="chart-container large">
                        <canvas id="analytics-chart"></canvas>
                    </div>
                </section>

                <section class="analytics-transactions card">
                    <h3>Детальный список операций</h3>
                    <div id="analytics-transactions-list" class="transactions-list">
                        <!-- Filtered transactions will be listed here -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
